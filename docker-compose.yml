services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: p7erp
      POSTGRES_PASSWORD: p7erp
      POSTGRES_DB: p7erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U p7erp -d p7erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://p7erp:p7erp@postgres:5432/p7erp
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      TENANT_STRATEGY: header
      WATCHFILES_FORCE_POLLING: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    # Dev mode: reload on Python file changes from bind-mounted source.
    # Note: migrations are run manually only when schema changes.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    # Dev mode Vite server for HMR in Docker.
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  postgres_data:
  frontend_node_modules:
